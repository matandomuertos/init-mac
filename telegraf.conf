#/opt/homebrew/etc/telegraf.conf
[global_tags]

[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "15s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false
  skip_processors_after_aggregators = true

[[outputs.prometheus_client]]
  listen = ":9100"
  ip_range = ["192.168.0.102/32","127.0.0.0/32"]
  path = "/metrics"


[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.swap]]

[[inputs.net]]

[[inputs.disk]]
  # This ignores internal macOS virtual drives and avoids clutter
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "autofs", "fdesc", "map"]

[[inputs.system]]

[[inputs.temp]]

[[inputs.exec]]
  commands = ["/opt/homebrew/bin/mactop --headless --count 1"]
  data_format = "json"
  timeout = "10s"
  interval = "15s"
  tag_keys = [
    "system_info_name",
    "thermal_state"
  ]
  name_override = "mactop_metrics"
  fieldinclude = ["system_info_core_count","system_info_gpu_core_count","memory_total","volumes_0_total_gb","cpu_usage","gpu_usage","soc_metrics_cpu_temp","soc_metrics_gpu_temp","soc_metrics_gpu_power","soc_metrics_cpu_power","soc_metrics_total_power","fans_0_rpm"]
  fieldexclude = ["link_up", "connected", "available", "auto"]

[[inputs.exec]]
  commands = ["/opt/homebrew/etc/telegraf-scripts/get_battery.sh"]
  timeout = "10s"
  data_format = "influx"
  interval = "15s"
  name_override = "battery_info"